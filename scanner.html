<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Discovery Bridge Node</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/3.12.0/tf.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        .scanner-container {
            position: relative;
            width: 480px;
            height: 360px;
            background: #020617;
            border-radius: 12px;
            border: 2px solid #334155;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas { z-index: 10; transform: scaleX(-1); }
        video { transform: scaleX(-1); }
        .status-banner {
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
            max-width: 450px;
            line-height: 1.4;
        }
        .oval-target {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 280px;
            border: 3px dashed #ef4444;
            border-radius: 50%;
            z-index: 6;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.65);
            transition: border-color 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="status-banner" id="label-hud-alert">Instantiating Neural Networks...</div>
    
    <div class="scanner-container">
        <div class="oval-target" id="target-alignment-frame"></div>
        <video id="hardware-video-stream" autoplay muted playsinline></video>
        <canvas id="vector-canvas-layer"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('hardware-video-stream');
        const hudAlert = document.getElementById('label-hud-alert');
        const targetFrame = document.getElementById('target-alignment-frame');
        
        let targetActionContext = "Clock In";
        let corporateRosterDataset = [];
        let modelWeightsLoaded = false;
        let scanSequenceActive = true;

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('action')) {
            targetActionContext = urlParams.get('action');
        }

        window.addEventListener("DOMContentLoaded", async () => {
            try {
                hudAlert.innerText = "Loading High-Sensitivity TinyFace Weights...";
                
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                modelWeightsLoaded = true;
                hudAlert.innerText = "Connecting handshake link to parent dashboard...";

                if (window.opener) {
                    window.opener.postMessage({ type: "SCANNER_READY" }, "*");
                } else {
                    hudAlert.innerText = "CORS Link Fault: Missing parent window context.";
                    hudAlert.style.color = "#ef4444";
                }

            } catch (err) {
                hudAlert.innerText = "CDN Initialization Exception: " + err.message;
                hudAlert.style.color = "#ef4444";
            }
        });

        window.addEventListener("message", async (event) => {
            if (event.data && event.data.type === "INITIALIZE_SCANNER_ROSTER") {
                corporateRosterDataset = event.data.roster || [];
                hudAlert.innerText = "Activating camera stream node...";
                await initializeHardwareCameraStream();
            }
        });

        // HARDWARE STREAM CONTROLLER WITH AUTOMATIC FALLBACK RESOLUTIONS
        async function initializeHardwareCameraStream() {
            // Profile Choice 1: Standard high-definition configuration
            const standardConstraints = {
                video: { width: 640, height: 480, facingMode: "user" },
                audio: false
            };

            // Profile Choice 2: Fail-safe legacy resolution for built-in or older laptop sensors
            const fallbackConstraints = {
                video: true,
                audio: false
            };

            try {
                console.log("Attempting standard camera initialization...");
                const mediaStream = await navigator.mediaDevices.getUserMedia(standardConstraints);
                bindStreamToVideo(mediaStream);
            } catch (standardErr) {
                console.warn("Standard resolution stream rejected. Injecting hardware fallback profile...", standardErr);
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                    bindStreamToVideo(fallbackStream);
                } catch (fallbackErr) {
                    hudAlert.innerText = "Hardware Camera Access Denied: Please check your browser privacy permissions.";
                    hudAlert.style.color = "#ef4444";
                }
            }
        }

        function bindStreamToVideo(stream) {
            videoElement.srcObject = stream;
            videoElement.onloadedmetadata = () => {
                hudAlert.innerText = `Align Face for ${targetActionContext}...`;
                targetFrame.style.borderColor = "#f59e0b";
                setTimeout(executeBiometricExtractionLoop, 1000);
            };
        }

        async function executeBiometricExtractionLoop() {
            if (!scanSequenceActive) return;

            try {
                // Tuned with a lightweight input scale size to allow fast background matrix calculations
                const detectionResult = await faceapi.detectSingleFace(
                    videoElement, 
                    new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.25 })
                )
                .withFaceLandmarks()
                .withFaceDescriptor();

                if (detectionResult) {
                    const currentLiveDescriptor = detectionResult.descriptor;
                    let optimizedMatchAsset = null;
                    let lowestEuclideanDistance = 0.65; // High tolerance threshold boundary

                    corporateRosterDataset.forEach(employeeProfile => {
                        if (employeeProfile.descriptor && employeeProfile.descriptor.length === 128) {
                            const currentDistance = faceapi.euclideanDistance(currentLiveDescriptor, employeeProfile.descriptor);
                            if (currentDistance < lowestEuclideanDistance) {
                                lowestEuclideanDistance = currentDistance;
                                optimizedMatchAsset = employeeProfile;
                            }
                        }
                    });

                    // IF DATABASE LAYER IS EMPTY OR NO BIOMETRIC REGISTER EXISTS YET:
                    if (corporateRosterDataset.length === 0 && window.opener) {
                        scanSequenceActive = false;
                        hudAlert.innerText = "Initial Baseline Matrix Sample Captured!";
                        targetFrame.style.borderColor = "#22c55e";

                        window.opener.postMessage({
                            type: "BIOMETRIC_RESPONSE",
                            matched: true,
                            email: window.opener.ACTIVE_SESSION_PROFILE ? window.opener.ACTIVE_SESSION_PROFILE.email : "boesbaraquel@globe.com.ph",
                            name: window.opener.ACTIVE_SESSION_PROFILE ? window.opener.ACTIVE_SESSION_PROFILE.name : "Terminal Administrator",
                            managerEmail: "management@globe.com.ph",
                            role: "Admin",
                            action: targetActionContext
                        }, "*");

                        setTimeout(() => { window.close(); }, 1500);
                        return;
                    }

                    if (optimizedMatchAsset) {
                        scanSequenceActive = false;
                        hudAlert.innerText = "MATCH VERIFIED! Syncing transaction logs...";
                        targetFrame.style.borderColor = "#22c55e";

                        if (window.opener) {
                            window.opener.postMessage({
                                type: "BIOMETRIC_RESPONSE",
                                matched: true,
                                email: optimizedMatchAsset.email,
                                name: optimizedMatchAsset.name,
                                managerEmail: optimizedMatchAsset.managerEmail,
                                role: optimizedMatchAsset.role || "Employee",
                                action: targetActionContext
                            }, "*");
                        }
                        
                        setTimeout(() => { window.close(); }, 1200);
                        return;
                    } else {
                        hudAlert.innerText = "Scanning... Align face inside the oval ring.";
                        targetFrame.style.borderColor = "#f59e0b";
                    }
                } else {
                    hudAlert.innerText = "No Face Tracked. Face the screen directly.";
                    targetFrame.style.borderColor = "#ef4444";
                }
            } catch (err) {
                console.error("Frame processing exception handled cleanly.");
            }

            if (scanSequenceActive) {
                setTimeout(executeBiometricExtractionLoop, 100);
            }
        }
    </script>
</body>
</html>
