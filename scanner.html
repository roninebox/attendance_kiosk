<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Discovery Bridge Node</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { 
            background: #090d16; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        .container { text-align: center; width: 100%; max-width: 460px; padding: 10px; }
        h3 { margin-bottom: 20px; font-weight: 500; font-size: 1.15rem; color: #ECEFF1; letter-spacing: 0.5px; }
        .camera-box { position: relative; width: 100%; height: 330px; border-radius: 16px; overflow: hidden; border: 3px solid #3F51B5; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .target-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 220px; border: 3px dashed #22c55e; border-radius: 50%; animation: pulse 1.5s infinite ease-in-out; pointer-events: none; z-index: 10; }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(1.04); opacity: 1; } }
        .laser-line { position: absolute; top: 15%; left: 0; width: 100%; height: 2px; background: #22c55e; box-shadow: 0 0 12px #22c55e; animation: scanMove 2s linear infinite; pointer-events: none; z-index: 5; }
        @keyframes scanMove { 0%, 100% { top: 15%; } 50% { top: 85%; } }
    </style>
</head>
<body>

    <div class="container">
        <h3 id="display-title">Awaiting Parent Command Configuration...</h3>
        <div class="camera-box">
            <video id="video-feed" autoplay playsinline muted></video>
            <div class="target-ring"></div>
            <div class="laser-line"></div>
        </div>
    </div>

    <script>
        // CHANGE THIS: Ensure this matches your absolute Apps Script Exec URL ending in /exec
        const GOOGLE_BACKEND_ENDPOINT = "https://script.google.com/a/macros/globe.com.ph/s/AKfycbz5n0WvJOhnd8EtQcgy4Fxp-vSMCQssk6bd9R5sqkfa2h-3dR_cLaBlUz1kxlgVabYV/exec";

        let mediaStream = null;
        let scanAnimationId = null;
        let targetAction = "Clock In";
        let syncToken = "";
        let memoryEmployeeRoster = [];

        // Catch the background roster data package passed down from the parent window context
        window.addEventListener("message", async (event) => {
            if (event.data && event.data.type === "INITIALIZE_DIRECTORY_ROSTER") {
                targetAction = event.data.action;
                syncToken = event.data.token;
                memoryEmployeeRoster = event.data.roster;
                
                document.getElementById('display-title').innerText = `Align Face Inside Ring to ${targetAction}`;
                await initializeBiometricHardware();
            }
        });

        async function initializeBiometricHardware() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480, facingMode: "user" }, audio: false 
                });
                
                document.getElementById('video-feed').srcObject = mediaStream;
                runScannerLoop();
            } catch(e) {
                alert("Webcam Initialization Fault: " + e.message);
                window.close();
            }
        }

        function runScannerLoop() {
            let frameCounter = 0;
            const videoEl = document.getElementById('video-feed');

            async function checkFrame() {
                if (!mediaStream) return;
                frameCounter++;
                
                if (frameCounter % 4 === 0) {
                    const foundFace = await faceapi.detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                    
                    if (foundFace) {
                        // Extract tracking landmarks vector points array coordinates signature matrix maps
                        const liveDescriptor = foundFace.descriptor || foundFace.landmarks.positions.map(p => p.x / 640);
                        
                        // IDENTITY RESOLUTION ENGINE: Scan descriptor arrays against the complete dataset roster
                        let bestMatchedProfile = null;
                        let minimumDistanceFound = 1.0; // Baseline Euclidean threshold infinity map maximum parameter bounds

                        memoryEmployeeRoster.forEach(employee => {
                            if (!employee.descriptor || employee.descriptor.length !== 128) return;
                            
                            // Calculate absolute geometric distance between the live camera feed and master array coordinates
                            let distanceAccumulator = 0;
                            for (let i = 0; i < 128; i++) {
                                let diff = liveDescriptor[i] - employee.descriptor[i];
                                distanceAccumulator += diff * diff;
                            }
                            let euclideanDistance = Math.sqrt(distanceAccumulator);

                            if (euclideanDistance < euclideanDistanceThreshold && euclideanDistance < minimumDistanceFound) {
                                minimumDistanceFound = euclideanDistance;
                                bestMatchedProfile = employee;
                            }
                        });

                        // Standard face recognition threshold cutoff constant rules
                        const euclideanDistanceThreshold = 0.6; 

                        if (bestMatchedProfile && minimumDistanceFound <= euclideanDistanceThreshold) {
                            document.getElementById('display-title').innerText = `Identified: ${bestMatchedProfile.name}! Submitting...`;
                            stopHardwareTracks();

                            // POST Handoff directly to Google's server instance nodes
                            const formPayload = new URLSearchParams();
                            formPayload.append("email", bestMatchedProfile.email);
                            formPayload.append("name", bestMatchedProfile.name);
                            formPayload.append("action", targetAction);
                            formPayload.append("token", syncToken);
                            formPayload.append("managerEmail", bestMatchedProfile.managerEmail);
                            formPayload.append("descriptor", JSON.stringify(Array.from(liveDescriptor).slice(0, 128)));

                            fetch(GOOGLE_BACKEND_ENDPOINT, {
                                method: "POST",
                                mode: "no-cors",
                                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                                body: formPayload.toString()
                            })
                            .then(() => window.close())
                            .catch(() => window.close());
                            return;
                        } else {
                            document.getElementById('display-title').innerText = "Unknown Profile. Align face cleaner...";
                        }
                    }
                }
                scanAnimationId = requestAnimationFrame(checkFrame);
            }
            scanAnimationId = requestAnimationFrame(checkFrame);
        }

        function stopHardwareTracks() {
            if (scanAnimationId) cancelAnimationFrame(scanAnimationId);
            if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
            document.getElementById('video-feed').srcObject = null;
        }
    </script>
</body>
</html>
