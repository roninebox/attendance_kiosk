<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Discovery Bridge Node</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/3.12.0/tf.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        .scanner-container {
            position: relative;
            width: 480px;
            height: 360px;
            background: #020617;
            border-radius: 12px;
            border: 2px solid #334155;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas { z-index: 10; transform: scaleX(-1); }
        video { transform: scaleX(-1); }
        .status-banner {
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-align: center;
        }
        .overlay-grid {
            position: absolute;
            inset: 0;
            border: 2px dashed rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 5;
        }
        .oval-target {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-translate, -50%);
            width: 220px;
            height: 280px;
            border: 2px dashed #22c55e;
            border-radius: 50%;
            z-index: 6;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.6);
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="status-banner" id="label-hud-alert">Instantiating Neural Networks...</div>
    
    <div class="scanner-container">
        <div class="overlay-grid"></div>
        <div class="oval-target" id="target-alignment-frame"></div>
        <video id="hardware-video-stream" autoplay silenced playsinline></video>
        <canvas id="vector-canvas-layer"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('hardware-video-stream');
        const canvasElement = document.getElementById('vector-canvas-layer');
        const hudAlert = document.getElementById('label-hud-alert');
        
        let targetActionContext = "Clock In";
        let corporateRosterDataset = [];
        let modelWeightsLoaded = false;
        let scanSequenceActive = true;

        // Parse ambient action parameters directly out of the incoming location URI
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('action')) {
            targetActionContext = urlParams.get('action');
        }

        window.addEventListener("DOMContentLoaded", async () => {
            try {
                hudAlert.innerText = "Loading Matrix Weights [face-api.js]...";
                
                // Fetch pre-compiled weights down to the edge cache layer
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                modelWeightsLoaded = true;
                hudAlert.innerText = "Connecting handshake link to parent dashboard...";

                // TWO-WAY HANDSHAKE: Signal back to Index.html that CDNs are loaded and ready to receive rosters
                if (window.opener) {
                    window.opener.postMessage({ type: "SCANNER_READY" }, "*");
                } else {
                    hudAlert.innerText = "CORS Link Fault: Missing parent window context.";
                }

            } catch (err) {
                hudAlert.innerText = "CDN Initialization Exception: " + err.message;
                hudAlert.style.color = "#ef4444";
            }
        });

        // RECEPTACLE LISTENER: Intercepts the master roster payload emitted by Index.html
        window.addEventListener("message", async (event) => {
            // Insulate cross-origin execution to avoid memory crashes
            if (event.data && event.data.type === "INITIALIZE_SCANNER_ROSTER") {
                corporateRosterDataset = event.data.roster || [];
                hudAlert.innerText = "Activating camera stream node...";
                await initializeHardwareCameraStream();
            }
        });

        async function initializeHardwareCameraStream() {
            try {
                const mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: "user"
                    },
                    audio: false
                });
                
                videoElement.srcObject = mediaStream;
                
                videoElement.onloadedmetadata = () => {
                    hudAlert.innerText = `Align Face for ${targetActionContext}...`;
                    // Begin looping facial extraction algorithms at 10 frames per second
                    setTimeout(executeBiometricExtractionLoop, 800);
                };
            } catch (err) {
                hudAlert.innerText = "Hardware Stream Denied: " + err.message;
                hudAlert.style.color = "#ef4444";
            }
        }

        async function executeBiometricExtractionLoop() {
            if (!scanSequenceActive) return;

            try {
                // Compute landmarks from the raw hardware frame
                const detectionResult = await faceapi.detectSingleFace(videoElement)
                    .withFaceLandmarks()
                    .withFaceDescriptor();

                if (detectionResult) {
                    const currentLiveDescriptor = detectionResult.descriptor;
                    let optimizedMatchAsset = null;
                    let lowestEuclideanDistance = 0.55; // Strict match boundary cutoff

                    // O(N) Linear Scan Search: Match real-time coordinates against corporate matrices
                    corporateRosterDataset.forEach(employeeProfile => {
                        if (employeeProfile.descriptor && employeeProfile.descriptor.length === 128) {
                            const currentDistance = faceapi.euclideanDistance(currentLiveDescriptor, employeeProfile.descriptor);
                            if (currentDistance < lowestEuclideanDistance) {
                                lowestEuclideanDistance = currentDistance;
                                optimizedMatchAsset = employeeProfile;
                            }
                        }
                    });

                    if (optimizedMatchAsset) {
                        // MATCH CONFIRMED: Stop looping and pass verification metadata back to Apps Script
                        scanSequenceActive = false;
                        hudAlert.innerText = "MATCH VERIFIED! Syncing transaction logs...";
                        document.getElementById('target-alignment-frame').style.borderColor = "#22c55e";

                        if (window.opener) {
                            window.opener.postMessage({
                                type: "BIOMETRIC_RESPONSE",
                                matched: true,
                                email: optimizedMatchAsset.email,
                                name: optimizedMatchAsset.name,
                                managerEmail: optimizedMatchAsset.managerEmail,
                                role: optimizedMatchAsset.role || "Employee",
                                action: targetActionContext
                            }, "*");
                        }
                        
                        setTimeout(() => { window.close(); }, 1200);
                        return;
                    } else {
                        hudAlert.innerText = "Scanning... Frame profile alignment required.";
                        document.getElementById('target-alignment-frame').style.borderColor = "#f59e0b";
                    }
                } else {
                    hudAlert.innerText = "No face detected inside tracking boundaries.";
                    document.getElementById('target-alignment-frame').style.borderColor = "#ef4444";
                }
            } catch (err) {
                console.error("Frame processing fault handled cleanly: ", err);
            }

            // Loop back into frame tracking queue memory stack
            if (scanSequenceActive) {
                setTimeout(executeBiometricExtractionLoop, 150);
            }
        }
    </script>
</body>
</html>
